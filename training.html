<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Staff Training · Elaborate</title>
<link rel="icon" type="image/png" href="/favicon.png"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,300&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --coral:#FF5733;--gold:#F4C542;--sage:#7DBE8E;--lav:#A78BFA;--sky:#38BDF8;
  --bg:#08080E;--surface:#0F0F18;--surface2:#16161F;--surface3:#1C1C28;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --txt:#F0EEF8;--muted:rgba(240,238,248,.45);--faint:rgba(240,238,248,.2);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}

/* ── TOP BAR ── */
.topbar{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(8,8,14,.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;z-index:100}
.topbar-logo{font-family:'Fraunces',serif;font-weight:900;font-size:1.15rem;letter-spacing:-.02em}
.topbar-logo span{color:var(--coral)}
.topbar-pill{font-family:'DM Mono',monospace;font-size:.55rem;padding:3px 9px;border-radius:50px;background:rgba(167,139,250,.15);color:var(--lav);letter-spacing:.1em;text-transform:uppercase}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.topbar-name{font-size:.8rem;color:var(--muted)}
.topbar-av{width:28px;height:28px;border-radius:8px;background:rgba(167,139,250,.2);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:900;font-size:.75rem;color:var(--lav)}

/* ── LAYOUT ── */
.shell{display:flex;padding-top:56px;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:248px;flex-shrink:0;border-right:1px solid var(--border);padding:24px 0 40px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.sidebar-label{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);padding:0 18px;margin:16px 0 8px}
.sidebar-label:first-child{margin-top:8px}
.phase-btn{display:flex;align-items:center;gap:11px;padding:10px 18px;cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent;transition:all .15s;border-radius:0}
.phase-btn:hover{background:rgba(255,255,255,.03)}
.phase-btn.active{background:rgba(167,139,250,.08);border-left-color:var(--lav)}
.phase-btn.done{border-left-color:var(--sage)}
.phase-btn.locked{opacity:.3;cursor:not-allowed;pointer-events:none}
.phase-icon{width:26px;height:26px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;font-family:'DM Mono',monospace;background:rgba(255,255,255,.06);color:var(--muted);transition:all .15s}
.phase-btn.active .phase-icon{background:rgba(167,139,250,.2);color:var(--lav)}
.phase-btn.done .phase-icon{background:rgba(125,190,142,.15);color:var(--sage)}
.phase-btn-text .phase-title{font-size:.82rem;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.phase-btn-text .phase-status{font-size:.67rem;color:var(--muted);margin-top:1px}
.sidebar-divider{height:1px;background:var(--border);margin:12px 18px}
.chat-btn{display:flex;align-items:center;gap:11px;padding:10px 18px;cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent;transition:all .15s}
.chat-btn:hover{background:rgba(255,255,255,.03)}
.chat-btn.active{background:rgba(244,197,66,.07);border-left-color:var(--gold)}
.chat-icon{width:26px;height:26px;border-radius:7px;background:rgba(244,197,66,.12);display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;position:relative}
.unread-dot{position:absolute;top:-2px;right:-2px;width:7px;height:7px;border-radius:50%;background:var(--coral);border:1.5px solid var(--bg);display:none}
.chat-btn-title{font-size:.82rem;font-weight:600;color:var(--txt)}
.chat-btn-sub{font-size:.67rem;color:var(--muted);margin-top:1px}

/* ── MAIN ── */
.main{flex:1;min-width:0;padding:40px 52px 100px;max-width:860px}

/* Phase view */
.phase-eyebrow{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--lav);margin-bottom:10px}
.phase-h1{font-family:'Fraunces',serif;font-size:2.2rem;font-weight:900;color:var(--txt);letter-spacing:-.03em;line-height:1.05;margin-bottom:10px}
.phase-sub{font-size:.92rem;color:var(--muted);line-height:1.65;max-width:600px;margin-bottom:32px}

/* Progress bar */
.prog-track{height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-bottom:40px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* Lesson card */
.lesson{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px}
.lesson-header{padding:20px 24px 16px;display:flex;align-items:flex-start;gap:14px;cursor:pointer;user-select:none}
.lesson-num{width:28px;height:28px;border-radius:8px;background:rgba(167,139,250,.12);color:var(--lav);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:.72rem;font-weight:700;flex-shrink:0;margin-top:1px}
.lesson-meta{flex:1;min-width:0}
.lesson-title{font-family:'Fraunces',serif;font-size:1.05rem;font-weight:700;color:var(--txt)}
.lesson-desc{font-size:.78rem;color:var(--muted);margin-top:3px}
.lesson-chevron{font-size:.8rem;color:var(--faint);transition:transform .2s;flex-shrink:0;margin-top:4px}
.lesson.open .lesson-chevron{transform:rotate(90deg)}
.lesson-body{padding:0 24px 24px;border-top:1px solid var(--border);display:none}
.lesson.open .lesson-body{display:block;padding-top:20px}

/* Body typography */
.lesson-body p{font-size:.88rem;color:rgba(240,238,248,.75);line-height:1.78;margin-bottom:12px}
.lesson-body p:last-child{margin-bottom:0}
.lesson-body strong{color:var(--txt);font-weight:700}
.lesson-body h4{font-family:'Fraunces',serif;font-size:.95rem;font-weight:700;color:var(--txt);margin:20px 0 10px}
.lesson-body ul{padding-left:0;list-style:none;display:flex;flex-direction:column;gap:7px;margin-bottom:14px}
.lesson-body ul li{font-size:.87rem;color:rgba(240,238,248,.72);line-height:1.65;padding-left:18px;position:relative}
.lesson-body ul li::before{content:'·';position:absolute;left:0;color:var(--lav);font-weight:900}
.ex{background:var(--surface2);border-left:3px solid var(--lav);border-radius:0 10px 10px 0;padding:13px 16px;margin:14px 0;font-size:.83rem;color:rgba(240,238,248,.7);line-height:1.7}
.ex.good{border-left-color:var(--sage)}
.ex.bad{border-left-color:var(--coral)}
.ex-label{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;font-weight:700}
.ex.good .ex-label{color:var(--sage)}
.ex.bad .ex-label{color:var(--coral)}
.ex.neutral .ex-label{color:var(--lav)}
.rule-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.rule-card{background:var(--surface3);border-radius:10px;padding:14px 16px}
.rule-card-title{font-size:.75rem;font-weight:700;margin-bottom:8px}
.rule-card ul{margin-bottom:0}
.tag{display:inline-block;font-family:'DM Mono',monospace;font-size:.6rem;padding:2px 8px;border-radius:4px;margin:2px 3px 2px 0;font-weight:600}
.tag-red{background:rgba(255,87,51,.12);color:var(--coral)}
.tag-gold{background:rgba(244,197,66,.1);color:#e8a800}
.tag-orange{background:rgba(251,146,60,.12);color:#FB923C}
.tag-lav{background:rgba(167,139,250,.12);color:var(--lav)}
.tag-sage{background:rgba(125,190,142,.12);color:var(--sage)}

/* Quiz */
.quiz-wrap{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-top:24px}
.quiz-title{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:800;color:var(--txt);margin-bottom:4px}
.quiz-sub{font-size:.8rem;color:var(--muted);margin-bottom:28px;line-height:1.6}
.quiz-q{margin-bottom:28px}
.quiz-q:last-of-type{margin-bottom:0}
.q-text{font-size:.9rem;font-weight:600;color:var(--txt);line-height:1.55;margin-bottom:12px}
.q-opts{display:flex;flex-direction:column;gap:7px}
.q-opt{display:flex;align-items:flex-start;gap:11px;padding:11px 15px;border-radius:10px;border:1.5px solid var(--border);background:transparent;cursor:pointer;transition:all .15s;text-align:left;width:100%;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--txt);line-height:1.5}
.q-opt:hover:not(:disabled){border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.05)}
.q-opt.sel{border-color:var(--lav);background:rgba(167,139,250,.1)}
.q-opt.correct{border-color:var(--sage)!important;background:rgba(125,190,142,.1)!important;color:var(--sage)!important}
.q-opt.wrong{border-color:var(--coral)!important;background:rgba(255,87,51,.08)!important;color:var(--coral)!important}
.q-letter{width:20px;height:20px;border-radius:5px;flex-shrink:0;background:rgba(255,255,255,.07);font-family:'DM Mono',monospace;font-size:.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--muted);margin-top:1px}
.q-fb{font-size:.8rem;padding:10px 14px;border-radius:8px;margin-top:9px;display:none;line-height:1.55}
.q-fb.show{display:block}
.q-fb.ok{background:rgba(125,190,142,.1);color:var(--sage)}
.q-fb.no{background:rgba(255,87,51,.08);color:var(--coral)}
.quiz-actions{margin-top:24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.btn-submit{padding:12px 28px;border-radius:50px;border:none;background:var(--lav);color:#fff;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.86rem;cursor:pointer;transition:all .2s}
.btn-submit:hover:not(:disabled){background:#9070f0;transform:translateY(-1px)}
.btn-submit:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn-retry{padding:12px 22px;border-radius:50px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:600;font-size:.86rem;cursor:pointer;transition:all .2s}
.btn-retry:hover{border-color:rgba(255,255,255,.2);color:var(--txt)}

/* Complete button */
.complete-btn{display:flex;align-items:center;gap:16px;margin-top:28px;padding:20px 24px;border-radius:14px;border:1.5px solid rgba(167,139,250,.3);background:linear-gradient(135deg,rgba(167,139,250,.1),rgba(56,189,248,.07));cursor:pointer;transition:all .22s;width:100%;font-family:'DM Sans',sans-serif;text-align:left}
.complete-btn:hover{background:linear-gradient(135deg,rgba(167,139,250,.2),rgba(56,189,248,.14));transform:translateY(-2px);box-shadow:0 8px 32px rgba(167,139,250,.15)}
.complete-btn-icon{width:40px;height:40px;border-radius:10px;background:rgba(167,139,250,.2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.complete-btn-copy{flex:1}
.complete-btn-title{font-weight:700;color:var(--txt);font-size:.92rem}
.complete-btn-sub{font-size:.75rem;color:var(--muted);margin-top:2px}
.complete-btn-arrow{font-size:1.1rem;color:var(--lav)}

/* Done banner */
.done-banner{background:linear-gradient(135deg,rgba(125,190,142,.1),rgba(56,189,248,.07));border:1.5px solid rgba(125,190,142,.25);border-radius:16px;padding:28px;text-align:center;margin-top:20px}
.done-star{font-size:2.2rem;margin-bottom:10px}
.done-title{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:900;color:var(--sage);margin-bottom:8px}
.done-sub{font-size:.86rem;color:var(--muted);line-height:1.65}
.all-done-banner{background:linear-gradient(135deg,rgba(244,197,66,.1),rgba(167,139,250,.08));border:1.5px solid rgba(244,197,66,.25);border-radius:16px;padding:36px;text-align:center;margin-bottom:28px}
.all-done-icon{font-size:3rem;margin-bottom:14px}
.all-done-title{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:900;color:var(--gold);margin-bottom:10px}
.all-done-sub{font-size:.88rem;color:var(--muted);line-height:1.7;max-width:460px;margin:0 auto}

/* Chat view */
.chat-view{display:flex;flex-direction:column;height:calc(100vh - 56px - 80px);min-height:400px}
.chat-hdr{margin-bottom:20px}
.chat-hdr h1{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:900;color:var(--txt)}
.chat-hdr p{font-size:.85rem;color:var(--muted);margin-top:7px;line-height:1.6}
.chat-notice{display:inline-flex;align-items:center;gap:7px;font-size:.75rem;color:var(--sage);margin-top:10px;background:rgba(125,190,142,.08);padding:6px 12px;border-radius:50px;border:1px solid rgba(125,190,142,.15)}
.chat-notice::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--sage);flex-shrink:0}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px;padding:16px;background:var(--surface);border-radius:14px;border:1px solid var(--border);margin-bottom:14px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.07) transparent}
.msg{display:flex;gap:9px;max-width:80%}
.msg.mine{flex-direction:row-reverse;align-self:flex-end}
.msg-av{width:28px;height:28px;border-radius:7px;flex-shrink:0;background:rgba(167,139,250,.2);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:900;font-size:.72rem;color:var(--lav)}
.msg.mine .msg-av{background:rgba(255,87,51,.15);color:var(--coral)}
.msg-bubble{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:9px 13px;font-size:.84rem;color:var(--txt);line-height:1.55;word-break:break-word}
.msg.mine .msg-bubble{background:rgba(167,139,250,.13);border-color:rgba(167,139,250,.2)}
.msg-meta{font-size:.63rem;color:var(--faint);margin-top:4px}
.msg.mine .msg-meta{text-align:right}
.msg-sys{align-self:center;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--faint);background:rgba(255,255,255,.03);border-radius:50px;padding:5px 14px;max-width:100%;text-align:center}
.chat-input-row{display:flex;gap:9px}
.chat-ta{flex:1;padding:11px 16px;border-radius:11px;border:1.5px solid var(--border);background:var(--surface);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;resize:none;transition:border-color .15s;min-height:42px;max-height:110px;line-height:1.5}
.chat-ta:focus{border-color:rgba(167,139,250,.4)}
.chat-send{padding:0 18px;border-radius:11px;border:none;background:var(--lav);color:#fff;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.84rem;cursor:pointer;transition:background .15s;height:42px;flex-shrink:0}
.chat-send:hover{background:#9070f0}
.chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--faint);font-size:.84rem;text-align:center}

/* Locked / access denied */
.gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:40px}
.gate-icon{font-size:3.5rem;margin-bottom:20px;opacity:.4}
.gate-title{font-family:'Fraunces',serif;font-size:1.6rem;font-weight:900;color:var(--txt);margin-bottom:10px}
.gate-sub{font-size:.88rem;color:var(--muted);max-width:400px;line-height:1.7;margin-bottom:28px}
.gate-btn{display:inline-block;padding:12px 28px;border-radius:50px;background:var(--lav);color:#fff;font-family:'DM Sans',sans-serif;font-weight:700;font-size:.86rem;text-decoration:none;transition:all .2s}
.gate-btn:hover{background:#9070f0;transform:translateY(-1px)}

/* Spinner */
.spinner-wrap{display:flex;align-items:center;justify-content:center;min-height:70vh}
.spinner{width:30px;height:30px;border:2.5px solid rgba(255,255,255,.08);border-top-color:var(--lav);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toasts{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:#1a1a26;border:1px solid var(--border2);border-radius:10px;padding:10px 20px;font-size:.82rem;font-weight:600;color:var(--txt);box-shadow:0 8px 32px rgba(0,0,0,.5);animation:toastIn .3s cubic-bezier(.22,1,.36,1) both;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:680px){
  .sidebar{display:none}
  .main{padding:24px 18px 80px}
  .phase-h1{font-size:1.6rem}
  .rule-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-logo">elaborate<span>.</span></span>
  <span class="topbar-pill">Staff Training</span>
  <div class="topbar-right">
    <span class="topbar-name" id="topName"></span>
    <div class="topbar-av" id="topAv">?</div>
  </div>
</div>
<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-label">Phases</div>
    <div id="phaseNav"></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-label">Support</div>
    <button class="chat-btn" id="chatBtn" onclick="showView('chat')">
      <div class="chat-icon">💬<div class="unread-dot" id="unreadDot"></div></div>
      <div>
        <div class="chat-btn-title">Staff Chat</div>
        <div class="chat-btn-sub">Ask a real staff member</div>
      </div>
    </button>
  </aside>
  <main class="main" id="main">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </main>
</div>
<div class="toasts" id="toasts"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc,
         collection, addDoc, query, orderBy, onSnapshot,
         serverTimestamp, getDocs }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app = initializeApp({apiKey:"AIzaSyA4f0NpoH1LLmbejrNmOgIxbD__MIUZkGs",authDomain:"elaborate-edc16.firebaseapp.com",projectId:"elaborate-edc16"});
const auth = getAuth(app);
const db   = getFirestore(app);

/* ═══════════════════════════════════════
   TRAINING CONTENT — 3 phases, 4 lessons each
═══════════════════════════════════════ */
const PHASES = [
{
  id:'p1', title:'Communicating with Users', sub:'How to write replies that actually help',
  color:'#A78BFA',
  lessons:[
    {
      title:'Tone and First Impressions',
      desc:'How every reply shapes what users think of Elaborate',
      body:`
        <p>Every message you send as a staff member represents the entire Elaborate team. Users come to support when they are frustrated, confused, or stuck. Your first job is to make them feel heard — before you even start solving anything.</p>
        <p>The standard we hold ourselves to: write like you are talking to a smart, busy person who deserves a real answer. Not a bot, not a corporate disclaimer, not a lecture. A real human response.</p>
        <h4>The tone spectrum</h4>
        <div class="ex bad"><div class="ex-label">Too cold / robotic</div>"Your request has been received and will be processed in accordance with our support policy."</div>
        <div class="ex good"><div class="ex-label">Right tone</div>"Hey — I can see why this is frustrating. Let me take a look and get this sorted for you."</div>
        <div class="ex bad"><div class="ex-label">Too casual / unprofessional</div>"lol yeah that bug is annoying, we'll fix it eventually"</div>
        <p>The right tone is <strong>warm, direct, and competent</strong>. You want the user to walk away feeling like they talked to someone who actually cared and actually knew what they were doing.</p>
        <h4>Things that kill trust immediately</h4>
        <ul>
          <li>Copying and pasting a generic response that doesn't address their specific issue</li>
          <li>Using filler phrases like "I apologize for any inconvenience this may have caused"</li>
          <li>Closing a ticket without confirming the problem is resolved</li>
          <li>Spelling the user's name wrong when it's right there in the ticket</li>
        </ul>
      `
    },
    {
      title:'Structuring a Perfect Reply',
      desc:'The three parts every good ticket response needs',
      body:`
        <p>A well-structured reply does three things in order: it acknowledges, it answers, and it closes. Skip any of these and the reply feels incomplete — even if the solution is technically correct.</p>
        <div class="rule-grid">
          <div class="rule-card"><div class="rule-card-title" style="color:var(--sky)">1. Acknowledge</div><ul><li>Name the problem back to them</li><li>Show you read the full ticket</li><li>One sentence is enough</li></ul></div>

          <div class="rule-card"><div class="rule-card-title" style="color:var(--gold)">3. Close</div><ul><li>Invite them back if needed</li><li>Do not close the ticket yet</li><li>One warm sentence</li></ul></div>
        </div>
        <h4>Full example</h4>
        <div class="ex good"><div class="ex-label">Complete reply</div>"Thanks for reaching out — I can see the app is not showing up in your hub after your teacher added it. This usually happens when the page needs a refresh after a classroom sync. Try: 1) Hard refresh the page (Ctrl+Shift+R / Cmd+Shift+R), 2) Log out and back in if that does not work. Let me know if it is still missing after those steps and I will dig deeper!"</div>
        <div class="ex bad"><div class="ex-label">Incomplete reply</div>"Try refreshing the page."</div>

      title:'Handling Difficult Users',

        <p>At some point you will get a ticket from someone who is angry, rude, or just plain wrong about something. This is not personal. Your response to how they treat you is one of the biggest tests of your professionalism.</p>
        <h4>The golden rule: never match their energy</h4>
        <p>If a user is rude and you respond with warmth and competence, most of them will soften. If you get defensive or lecture them about their tone, almost none of them will. Pick your outcome.</p>
        <div class="ex bad"><div class="ex-label">Takes the bait</div>"There is no need to be rude. We are trying to help you here."</div>
        <div class="ex good"><div class="ex-label">Stays focused</div>"I totally get how frustrating this must be — let me fix this for you right now."</div>
        <p>The second response skips the lecture entirely and moves straight to helping. The user gets what they actually came for.</p>
        <h4>When a user is factually wrong</h4>
        <p>Do not just say "you are wrong." Correct gently and give them an out.</p>
        <div class="ex bad"><div class="ex-label">Blunt correction</div>"That is not how it works. You misunderstood the feature."</div>
        <div class="ex good"><div class="ex-label">Soft correction</div>"This one is a bit counterintuitive — the feature works slightly differently than it looks. Here is how it actually works: …"</div>
        <h4>When to stop engaging</h4>
        <p>If a user is genuinely threatening, harassing, or making the conversation impossible, do not continue. Send one final professional response, escalate to a Sr. Admin, and stop replying until you hear back. Document everything.</p>
      `

    {
      title:'Response Time and Follow-Through',
      desc:'Setting expectations and keeping your word',
      body:`
        <p>One of the fastest ways to destroy a user's trust is to promise something and not deliver. The second fastest is to go silent on a ticket they are waiting on.</p>
        <h4>Response time expectations</h4>
        <ul>
          <li><strong>High priority tickets</strong> (account access, suspensions, safety concerns) — respond within a few hours</li>
          <li><strong>Standard tickets</strong> — respond within 24 hours wherever possible</li>
          <li><strong>Low priority</strong> (feedback, suggestions) — 48-72 hours is acceptable</li>
        </ul>
        <p>If you cannot meet those timelines, send a short acknowledgment letting them know you have seen the ticket and are looking into it. Radio silence is always worse than a brief "I am on it."</p>
        <h4>The follow-through rule</h4>
        <p>If you tell a user you will get back to them, you must actually get back to them. This sounds obvious but it is the single most common failure in support. Write yourself a note. Put a reminder somewhere. Do not let a ticket go stale.</p>
        <div class="ex bad"><div class="ex-label">Promise with no follow-through</div>"I will look into this and get back to you soon!" — [ticket sits for a week with no update]</div>

let currentUser = null;
let progress    = null;
let progressRef = null;
let view        = 'p1';
let qAnswers    = {};
let qLocked     = {};
let chatUnsub   = null;

/* ═══════════════════════════════════════
   AUTH + ACCESS GATE
═══════════════════════════════════════ */
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = '/index.html'; return; }
  currentUser = user;

  const name = user.displayName || user.email;
  document.getElementById('topName').textContent = name;
  document.getElementById('topAv').textContent = (name[0]||'?').toUpperCase();

  progressRef = doc(db, 'trainingProgress', user.uid);
  const snap  = await getDoc(progressRef);

  if (!snap.exists()) {
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('main').innerHTML = `
      <div class="gate">
        <div class="gate-icon">🔒</div>
        <div class="gate-title">Not enrolled in training</div>
        <div class="gate-sub">This page is only accessible to staff who have been accepted and enrolled by an admin. If you believe this is a mistake, reach out to the team.</div>
        <a href="/index.html" class="gate-btn">← Back to Elaborate</a>
      </div>`;
    return;
  }

  onSnapshot(progressRef, s => {
    progress = s.data();
    renderNav();
    if (view !== 'chat') renderPhase(view);
  });

  startChat();
});

/* ═══════════════════════════════════════
   NAV
═══════════════════════════════════════ */
function renderNav() {
  if (!progress) return;
  document.getElementById('phaseNav').innerHTML = PHASES.map((ph,i) => {
    const st  = progress.phases?.[ph.id]?.status || 'locked';
    const dot = st==='completed' ? '✓' : st==='locked' ? '🔒' : String(i+1);
    const cls = (st==='completed'?'done':st==='locked'?'locked':'') + (view===ph.id?' active':'');
    return `<button class="phase-btn ${cls}" onclick="showView('${ph.id}')">
      <div class="phase-icon">${dot}</div>
      <div class="phase-btn-text">
        <div class="phase-title">Phase ${i+1}</div>
        <div class="phase-status">${st==='completed'?'Complete':st==='in_progress'?'In progress':'Locked'}</div>
      </div>
    </button>`;
  }).join('');
  const cb = document.getElementById('chatBtn');
  if (cb) cb.className = 'chat-btn' + (view==='chat'?' active':'');
}

/* ═══════════════════════════════════════
   SHOW VIEW
═══════════════════════════════════════ */
window.showView = function(id) {
  if (id !== 'chat' && progress) {
    const st = progress.phases?.[id]?.status || 'locked';
    if (st === 'locked') return;
  }
  view = id;
  renderNav();
  if (id === 'chat') renderChatView();
  else renderPhase(id);
  window.scrollTo({top:0,behavior:'smooth'});
};

/* ═══════════════════════════════════════
   RENDER PHASE
═══════════════════════════════════════ */
function renderPhase(pid) {
  const el = document.getElementById('main');
  const ph = PHASES.find(p=>p.id===pid);
  if (!ph || !progress) return;

  const phData = progress.phases?.[pid] || {status:'locked',quizPassed:false};
  const phIdx  = PHASES.findIndex(p=>p.id===pid);
  const done   = PHASES.filter(p=>progress.phases?.[p.id]?.status==='completed').length;
  const pct    = Math.round((done/PHASES.length)*100);
  const passed = phData.quizPassed;

  let html = '';

  if (progress.completed) {
    html += `<div class="all-done-banner">
      <div class="all-done-icon">🏆</div>
      <div class="all-done-title">Training Complete!</div>
      <div class="all-done-sub">You have finished all three phases. The admin team has been notified and will follow up with your next steps. Welcome to the team.</div>
    </div>`;
  }

  html += `<div class="phase-eyebrow">Phase ${phIdx+1} of ${PHASES.length}</div>
  <div class="phase-h1">${ph.title}</div>
  <div class="phase-sub">${ph.sub}</div>
  <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,${ph.color},${ph.color}99)"></div></div>`;

  // Lessons
  ph.lessons.forEach((l,li) => {
    const isOpen = li === 0;
    html += `<div class="lesson${isOpen?' open':''}" id="lesson_${pid}_${li}">
      <div class="lesson-header" onclick="toggleLesson('${pid}',${li})">
        <div class="lesson-num">${li+1}</div>
        <div class="lesson-meta">
          <div class="lesson-title">${l.title}</div>
          <div class="lesson-desc">${l.desc}</div>
        </div>
        <div class="lesson-chevron">›</div>
      </div>
      <div class="lesson-body">${l.body}</div>
    </div>`;
  });

  // Quiz
  if (!passed) {
    html += buildQuiz(pid, ph, phIdx);
  }

  // Complete button
  if (passed && phData.status !== 'completed') {
    html += `<button class="complete-btn" onclick="completePhase('${pid}')">
      <div class="complete-btn-icon">→</div>
      <div class="complete-btn-copy">
        <div class="complete-btn-title">Mark Phase ${phIdx+1} Complete</div>
        <div class="complete-btn-sub">Quiz passed — lock in your progress and continue</div>
      </div>
      <div class="complete-btn-arrow">✦</div>
    </button>`;
  }

  if (phData.status === 'completed') {
    const next = PHASES[phIdx+1];
    html += `<div class="done-banner">
      <div class="done-star">✦</div>
      <div class="done-title">Phase ${phIdx+1} Complete</div>
      <div class="done-sub">${next ? `Head to <strong>Phase ${phIdx+2}: ${next.title}</strong> when you are ready.` : 'All phases done — great work.'}</div>
    </div>`;
  }

  el.innerHTML = html;
}

/* ═══════════════════════════════════════
   LESSON TOGGLE
═══════════════════════════════════════ */
window.toggleLesson = function(pid, li) {
  const el = document.getElementById('lesson_'+pid+'_'+li);
  if (el) el.classList.toggle('open');
};

/* ═══════════════════════════════════════
   QUIZ
═══════════════════════════════════════ */
function buildQuiz(pid, ph, phIdx) {
  const ans = qAnswers[pid] || {};
  const lck = qLocked[pid]  || {};
  const allAnswered = ph.quiz.every((_,qi)=>ans[qi]!==undefined);
  const allLocked   = ph.quiz.every((_,qi)=>lck[qi]);
  const allCorrect  = allLocked && ph.quiz.every((q,qi)=>ans[qi]===q.correct);

  let html = `<div class="quiz-wrap">
    <div class="quiz-title">Phase ${phIdx+1} Quiz</div>
    <div class="quiz-sub">Answer all ${ph.quiz.length} questions correctly. Review the lessons above if needed — you can retry as many times as you like.</div>`;

  ph.quiz.forEach((q,qi) => {
    const sel = ans[qi]; const l = lck[qi];
    html += `<div class="quiz-q"><div class="q-text">${qi+1}. ${q.q}</div><div class="q-opts">`;
    q.opts.forEach((opt,oi) => {
      let cls = '';
      if (l) { if (oi===q.correct) cls='correct'; else if (oi===sel && sel!==q.correct) cls='wrong'; }
      else if (sel===oi) cls='sel';
      html += `<button class="q-opt ${cls}" onclick="pickAnswer('${pid}',${qi},${oi})" ${l?'disabled':''}><span class="q-letter">${['A','B','C','D'][oi]}</span>${opt}</button>`;
    });
    html += '</div>';
    if (l) html += `<div class="q-fb show ${ans[qi]===q.correct?'ok':'no'}">${ans[qi]===q.correct?'Correct. ':'Not quite. '}${q.feedback}</div>`;
    html += '</div>';
  });

  if (allLocked && !allCorrect) {
    html += `<div class="quiz-actions"><button class="btn-retry" onclick="retryQuiz('${pid}')">Retry Quiz</button><span style="font-size:.8rem;color:var(--muted)">Review the lessons above, then try again.</span></div>`;
  } else {
    html += `<div class="quiz-actions"><button class="btn-submit" onclick="submitQuiz('${pid}')" ${allAnswered&&!allLocked?'':'disabled'}>Submit →</button></div>`;
  }
  return html + '</div>';
}

window.pickAnswer = function(pid,qi,oi) {
  if ((qLocked[pid]||{})[qi]) return;
  if (!qAnswers[pid]) qAnswers[pid]={};
  qAnswers[pid][qi] = oi;
  renderPhase(pid);
};
window.submitQuiz = function(pid) {
  const ph = PHASES.find(p=>p.id===pid);
  if (!ph) return;
  if (!qLocked[pid]) qLocked[pid]={};
  ph.quiz.forEach((_,qi)=>{ qLocked[pid][qi]=true; });
  const allCorrect = ph.quiz.every((q,qi)=>(qAnswers[pid]||{})[qi]===q.correct);
  if (allCorrect) updateDoc(progressRef,{[`phases.${pid}.quizPassed`]:true});
  renderPhase(pid);
};
window.retryQuiz = function(pid) {
  qAnswers[pid]={}; qLocked[pid]={};
  renderPhase(pid);
};

/* ═══════════════════════════════════════
   COMPLETE PHASE
═══════════════════════════════════════ */
window.completePhase = async function(pid) {
  const phIdx = PHASES.findIndex(p=>p.id===pid);
  const next  = PHASES[phIdx+1];
  const upd   = {[`phases.${pid}.status`]:'completed'};
  if (next) { upd[`phases.${next.id}.status`]='in_progress'; upd.phase=next.id; }
  else { upd.completed=true; upd.completedAt=serverTimestamp(); await postCompletion(); }
  await updateDoc(progressRef, upd);
  if (next) showView(next.id);
};

async function postCompletion() {
  const name = currentUser.displayName || currentUser.email;
  try {
    await addDoc(collection(db,'staffNotes'), {
      authorUid:'system', authorName:'Training System',
      text: name+' ('+currentUser.email+') has completed all 3 phases of staff training and is ready for onboarding review.',
      type:'training_complete', traineeUid:currentUser.uid,
      traineeEmail:currentUser.email, traineeName:name,
      createdAt:serverTimestamp(),
    });
  } catch(e) {}
}

/* ═══════════════════════════════════════
   CHAT
═══════════════════════════════════════ */
function startChat() {
  const q = query(collection(db,'trainingChats',currentUser.uid,'messages'),orderBy('createdAt','asc'));
  chatUnsub = onSnapshot(q, snap => {
    const msgs = snap.docs.map(d=>({id:d.id,...d.data()}));
    const unread = msgs.some(m=>m.senderRole==='staff'&&!m.readByTrainee);
    document.getElementById('unreadDot').style.display = unread?'block':'none';
    if (view==='chat') renderMsgs(msgs);
  });
  setDoc(doc(db,'trainingChats',currentUser.uid),{
    traineeUid:currentUser.uid, traineeEmail:currentUser.email,
    traineeName:currentUser.displayName||currentUser.email,
    lastActivity:serverTimestamp(),
  },{merge:true});
}

function renderChatView() {
  document.getElementById('main').innerHTML = `<div class="chat-view">
    <div class="chat-hdr">
      <h1>Staff Chat</h1>
      <p>Ask questions, get guidance, or flag anything that is unclear. A real staff member will respond here — usually within a few hours.</p>
      <div class="chat-notice">Staff are notified when you send a message</div>
    </div>
    <div class="chat-msgs" id="chatMsgs"><div class="chat-empty"><span style="font-size:2rem">💬</span><span>Loading…</span></div></div>
    <div class="chat-input-row">
      <textarea class="chat-ta" id="chatTa" placeholder="Type a message…" rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,110)+'px'"></textarea>
      <button class="chat-send" onclick="sendMsg()">Send</button>
    </div>
  </div>`;

  getDocs(query(collection(db,'trainingChats',currentUser.uid,'messages'),orderBy('createdAt','asc'))).then(snap => {
    const msgs = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderMsgs(msgs);
    msgs.filter(m=>m.senderRole==='staff'&&!m.readByTrainee).forEach(m=>
      updateDoc(doc(db,'trainingChats',currentUser.uid,'messages',m.id),{readByTrainee:true}));
  });
}

function renderMsgs(msgs) {
  const el = document.getElementById('chatMsgs');
  if (!el) return;
  if (!msgs.length) {
    el.innerHTML = `<div class="chat-empty"><span style="font-size:2rem">💬</span><span>No messages yet — say hello!</span></div>`;
    return;
  }
  el.innerHTML = msgs.map(m => {
    if (m.type==='system'||m.system) return `<div class="msg-sys">${esc(m.text)}</div>`;
    const mine = m.senderUid===currentUser.uid;
    const time = m.createdAt?.toDate?m.createdAt.toDate().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}):'';
    return `<div class="msg ${mine?'mine':''}">
      <div class="msg-av">${(m.senderName||'?')[0].toUpperCase()}</div>
      <div><div class="msg-bubble">${esc(m.text)}</div><div class="msg-meta">${esc(m.senderName||'')} · ${time}</div></div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

window.sendMsg = async function() {
  const ta = document.getElementById('chatTa');
  const txt = (ta?.value||'').trim();
  if (!txt) return;
  ta.value=''; ta.style.height='';
  const name = currentUser.displayName||currentUser.email;
  await addDoc(collection(db,'trainingChats',currentUser.uid,'messages'),{
    text:txt, senderUid:currentUser.uid, senderName:name,
    senderRole:'trainee', createdAt:serverTimestamp(),
    readByTrainee:true, readByStaff:false,
  });
  updateDoc(doc(db,'trainingChats',currentUser.uid),{lastActivity:serverTimestamp()});
};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function toast(msg){const c=document.getElementById('toasts');const t=document.createElement('div');t.className='toast';t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),3200)}
</script>
